name: Generate Daily Post
# Runs nightly and on manual dispatch to generate an AI post and open a PR
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/generate_post.py

      - name: Validate schemas
        run: python scripts/validate_schemas.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add AI-generated post (${{ env.POST_ID }})"
          branch: ai-post/${{ github.run_id }}
          title: "AI Post: ${{ env.POST_TITLE }}"
          body-path: /tmp/pr_body.md
          labels: ai-generated,content
          delete-branch: true
